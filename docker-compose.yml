version: '3.8'

services:
  # 1. MySQL Database Service
  db:
    image: mysql:8.0
    container_name: skillswap-db
    restart: always
    environment:
      MYSQL_DATABASE: skillswap
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pwhynot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Spring Boot Backend Service
  backend:
    build: ./backend
    container_name: skillswap-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/skillswap?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads

  # 3. Nginx + React Frontend Service
  frontend:
    build: ./frontend
    container_name: skillswap-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  uploads_data:
